services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ml_predictive_api
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/
      - MONGODB_DB_NAME=predictions_db
      - API_HOST=0.0.0.0
      - API_PORT=5000
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - ml_network

  mongo:
    image: mongo:6.0
    container_name: ml_predictive_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", 'mongosh --eval ''db.adminCommand("ping")''']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml_network

volumes:
  mongo_data:

networks:
  ml_network:
    driver: bridge
